    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: "Outfit", system-ui, sans-serif;
    }

    .docs-shell {
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      background: var(--bg-soft);
    }

    .docs-header {
      max-width: 1200px;
      margin: 0 auto 20px;
      color: var(--text);
    }

    .docs-header p {
      margin: 0 0 8px;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.72rem;
    }

    .docs-header h1 {
      margin: 0 0 10px;
      font-size: 2rem;
    }

    .docs-header span {
      color: var(--muted);
    }

    .docs-toolbar {
      max-width: 1200px;
      margin: 0 auto 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      border-radius: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
    }

    .docs-toolbar-group {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .toolbar-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }

    .toolbar-block label {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 500;
    }

    select,
    .theme-toggle {
      margin: 0;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--field-bg-strong);
      color: var(--text);
      font: inherit;
      box-sizing: border-box;
    }

    select {
      appearance: none;
      padding-right: 42px;
      background-image:
        linear-gradient(45deg, transparent 50%, var(--select-arrow) 50%),
        linear-gradient(135deg, var(--select-arrow) 50%, transparent 50%);
      background-position:
        calc(100% - 18px) calc(50% - 3px),
        calc(100% - 12px) calc(50% - 3px);
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      cursor: pointer;
    }

    .toggle-track {
      width: 48px;
      height: 28px;
      border-radius: 999px;
      background: var(--toggle-track-bg);
      border: 1px solid var(--toggle-track-border);
      position: relative;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.12);
    }

    .toggle-thumb {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--warning), var(--primary));
      transition: transform 0.25s ease;
    }

    body.light .toggle-thumb {
      transform: translateX(20px);
    }

    #swagger-ui {
      max-width: 1200px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .swagger-ui {
      color: var(--text);
    }

    .swagger-ui .topbar {
      display: none;
    }

    .swagger-ui .scheme-container,
    .swagger-ui section.models,
    .swagger-ui .opblock-tag,
    .swagger-ui .information-container,
    .swagger-ui .opblock,
    .swagger-ui .responses-inner,
    .swagger-ui .opblock-section-header,
    .swagger-ui .model-box,
    .swagger-ui .dialog-ux .modal-ux,

      background: var(--surface-strong) !important;
      color: var(--text) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .information-container,
    .swagger-ui .scheme-container {
      box-shadow: none !important;
    }

    .swagger-ui .opblock .opblock-summary,
    .swagger-ui .opblock-description-wrapper p,
    .swagger-ui .opblock-external-docs-wrapper p,
    .swagger-ui .opblock-title_normal p,
    .swagger-ui .parameter__name,

    .swagger-ui .response-col_status,

    .swagger-ui .responses-table td,
    .swagger-ui .model-title,

    .swagger-ui .tab li button.tablinks,
    .swagger-ui .markdown p,

    .swagger-ui .info li,

    .swagger-ui .info a,
    .swagger-ui .info hgroup.main .title,
    .swagger-ui .opblock-tag,
    .swagger-ui .authorization__btn,
    .swagger-ui .btn,
    .swagger-ui select,
    .swagger-ui input[type=text],
    .swagger-ui textarea {
      color: var(--text) !important;
    }

    .swagger-ui .info .base-url,
    .swagger-ui .parameter__deprecated,
    .swagger-ui .response-col_description__inner p,
    .swagger-ui .model,
    .swagger-ui .responses-inner h4,
    .swagger-ui .responses-inner h5,
    .swagger-ui .prop-type,
    .swagger-ui .prop-format,
    .swagger-ui .servers > label,
    .swagger-ui .servers-title,
    .swagger-ui .opblock-summary-description {
      color: var(--muted) !important;
    }

    .swagger-ui .opblock-tag,
    .swagger-ui .opblock .opblock-summary-method,
    .swagger-ui .btn.execute,
    .swagger-ui .btn.authorize,
    .swagger-ui a.nostyle,
    .swagger-ui .info a {
      color: var(--primary) !important;
    }

    .swagger-ui .btn.execute,
    .swagger-ui .btn.authorize,
    .swagger-ui .btn.try-out__btn,
    .swagger-ui .btn.cancel,
    .swagger-ui .btn.clear {
      border-color: var(--primary) !important;
      box-shadow: none !important;
    }

    .swagger-ui .btn.execute {
      background: var(--primary) !important;
      color: #0b1220 !important;
    }

    .swagger-ui input[type=text],
    .swagger-ui textarea,
    .swagger-ui select {
      background: var(--field-bg) !important;
      border-color: var(--border) !important;
    }

    .swagger-ui .opblock.opblock-get {
      border-color: color-mix(in srgb, var(--primary) 28%, transparent) !important;
      background: color-mix(in srgb, var(--primary) 10%, var(--surface-strong)) !important;
    }

    .swagger-ui .opblock.opblock-post {
      border-color: color-mix(in srgb, var(--success) 28%, transparent) !important;
      background: color-mix(in srgb, var(--success) 9%, var(--surface-strong)) !important;
    }

    .swagger-ui .opblock.opblock-put {
      border-color: color-mix(in srgb, var(--warning) 28%, transparent) !important;
      background: color-mix(in srgb, var(--warning) 9%, var(--surface-strong)) !important;
    }

    .swagger-ui .opblock.opblock-delete {
      border-color: color-mix(in srgb, var(--danger) 28%, transparent) !important;
      background: color-mix(in srgb, var(--danger) 9%, var(--surface-strong)) !important;
    }

    @media (max-width: 720px) {
      .docs-shell {
        padding: 16px;
      }

      .docs-toolbar {
        padding: 16px;
      }

      .docs-toolbar-group,
      .toolbar-block {
        width: 100%;
      }

      .theme-toggle,
      select {
        width: 100%;
      }
    }
  </style>

<body>
  <div class="docs-shell">
    <div class="docs-header">
      <p>OpenAPI</p>
      <h1>TaskFlow CSV API</h1>
      <span>Interactive Swagger UI for the CSV + SQLite-backed task API.</span>
    </div>

    <div class="docs-toolbar">
      <div class="docs-toolbar-group">
        <div class="toolbar-block">
          <label for="themeToggle">Theme</label>
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="Change theme">
            <span class="toggle-track">
              <span class="toggle-thumb"></span>
            </span>
            <span id="themeLabel">Dark</span>
          </button>
        </div>
        <div class="toolbar-block">
          <label for="colorSchemeSelect">Color scheme</label>
          <select id="colorSchemeSelect" aria-label="Select color scheme">
            <option value="default">Default</option>
            <option value="aurora">Aurora</option>
            <option value="eighties">80s</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="ember">Ember</option>
            <option value="forest">Forest</option>
            <option value="neon">Neon</option>
            <option value="rose">Rose Quartz</option>
          </select>
        </div>
      </div>
    </div>

    <div id="swagger-ui"></div>
  </div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const themeKey = 'todo-theme';
    const colorSchemeKey = 'todo-color-scheme';
    const themeToggle = document.querySelector('#themeToggle');
    const themeLabel = document.querySelector('#themeLabel');
    const colorSchemeSelect = document.querySelector('#colorSchemeSelect');

    function updateThemeLabel(theme) {
      themeLabel.textContent = theme === 'light' ? 'Light' : 'Dark';
    }

    function applyColorScheme(colorScheme) {
      const supportedSchemes = new Set(['default', 'aurora', 'eighties', 'cyberpunk', 'ember', 'forest', 'neon', 'rose']);
      const nextScheme = supportedSchemes.has(colorScheme) ? colorScheme : 'default';
      document.body.dataset.colorScheme = nextScheme;
      colorSchemeSelect.value = nextScheme;
      localStorage.setItem(colorSchemeKey, nextScheme);
    }

    function applySavedThemeSettings() {
      const savedTheme = localStorage.getItem(themeKey) || 'dark';
      const savedColorScheme = localStorage.getItem(colorSchemeKey) || 'default';
      document.body.classList.toggle('light', savedTheme === 'light');
      updateThemeLabel(savedTheme);
      applyColorScheme(savedColorScheme);
    }

    themeToggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      const nextTheme = isLight ? 'light' : 'dark';
      localStorage.setItem(themeKey, nextTheme);
      updateThemeLabel(nextTheme);
    });

    colorSchemeSelect.addEventListener('change', () => {
      applyColorScheme(colorSchemeSelect.value);
    });

    applySavedThemeSettings();

    window.ui = SwaggerUIBundle({
      url: '/openapi.json',
      dom_id: '#swagger-ui',
      deepLinking: true,
      displayRequestDuration: true,
      persistAuthorization: false,
      tryItOutEnabled: true
    });
  </script>
</body>
</html>
